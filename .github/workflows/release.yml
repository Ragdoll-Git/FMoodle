name: Build and Release FMoodle

on:
  push:
    tags:
      - 'FMoodle-v*'
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: PC/requirements*.txt

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r PC/requirements-dev.txt

    - name: Determine version from tag
      id: version
      shell: pwsh
      run: |
        $ref = "${{ github.ref_name }}"
        if ($ref -match '(\d+\.\d+(\.\d+)?)') {
          $version = $Matches[1]
        } else {
          $version = "3.6.0"
        }
        "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        Write-Host "Versión del release: $version"

    - name: Write app version
      shell: pwsh
      run: |
        $v = "${{ steps.version.outputs.version }}"
        "__version__ = `"$v`"" | Out-File -FilePath PC/version.py -Encoding utf8
        Get-Content PC/version.py

    - name: Run Tests
      working-directory: PC
      run: python -m pytest tests -v

    - name: Build Executables with PyInstaller
      working-directory: PC
      run: python build.py

    - name: Install Inno Setup
      run: choco install innosetup --no-progress -y

    - name: Build Installer with Inno Setup
      shell: cmd
      working-directory: PC
      run: '"C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DMyAppVersion=${{ steps.version.outputs.version }} inno_setup.iss'

    - name: Package Chrome Extension
      shell: pwsh
      run: Compress-Archive -Path extension/* -DestinationPath FMoodle_Extension.zip -Force

    - name: Create Release and Upload Assets
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: |
          PC/dist/FMoodle_Portable.exe
          PC/Output/FMoodle_Installer.exe
          FMoodle_Extension.zip
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
