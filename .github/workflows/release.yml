name: Build and Release FMoodle

on:
  push:
    tags:
      - 'FMoodle-v*'
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Build Executables with PyInstaller
      run: |
        python build.py

    - name: Determine version from tag
      id: version
      shell: pwsh
      run: |
        $ref = "${{ github.ref_name }}"
        if ($ref -match '(\d+\.\d+(\.\d+)?)') {
          $version = $Matches[1]
        } else {
          $version = "3.6.0"
        }
        "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        Write-Host "Versión del instalador: $version"

    - name: Install Inno Setup
      run: choco install innosetup --no-progress -y

    - name: Build Installer with Inno Setup
      shell: cmd
      run: '"C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DMyAppVersion=${{ steps.version.outputs.version }} inno_setup.iss'

    - name: Create Release and Upload Assets
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: |
          dist/FMoodle_Portable.exe
          Output/FMoodle_Installer.exe
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
